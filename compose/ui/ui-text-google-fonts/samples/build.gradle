import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("AndroidXComposePlugin")
}

dependencies {
    compileOnly(project(":annotation:annotation-sampled"))

    implementation("androidx.compose.foundation:foundation:1.2.1")
    implementation("androidx.compose.material:material:1.2.1")
    implementation(project(":compose:ui:ui-text-google-fonts"))
}

androidx {
    name = "Compose Google Fonts integration"
    type = SoftwareType.SAMPLES
    inceptionYear = "2026"
    description = "Contains the sample code for Compose Google Fonts integration"
}

android {
    compileSdk { version = preview("Baklava") }
    namespace = "androidx.compose.ui.text.googlefonts.samples"
}
