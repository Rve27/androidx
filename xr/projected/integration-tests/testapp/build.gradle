import androidx.build.ApkCopyHelperKt
import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
    id("com.android.application")
}

dependencies {
    implementation(project(":xr:projected:projected"))

    implementation("androidx.activity:activity:1.12.1")
    implementation("androidx.activity:activity-compose:1.12.1")
    implementation("androidx.appcompat:appcompat:1.7.0")
    implementation("androidx.compose.foundation:foundation-layout:1.7.5")
    implementation("androidx.compose.material3:material3:1.3.1")
    implementation("androidx.compose.runtime:runtime:1.7.5")
    implementation("androidx.compose.ui:ui:1.7.5")
    implementation("androidx.compose.ui:ui-unit:1.7.5")
    implementation("androidx.camera:camera-camera2:1.6.1")
    implementation("androidx.camera:camera-core:1.6.1")
    implementation("androidx.camera:camera-view:1.6.1")
    implementation("androidx.camera:camera-lifecycle:1.6.1")

}

android {
    compileSdk { version = release(36) }
    namespace = "androidx.xr.projected.testapp"

    defaultConfig {
        minSdk { version = release(36) }
    }

    buildTypes {
        release {
            optimization {
                enable = true
            }
        }
    }
}

androidx {
    name = "JXR Projected Tests"
    type = SoftwareType.TEST_APPLICATION
    inceptionYear = "2025"
    description = "Test app that exercises the XR Projected APIs."
}

// Making this APK available via Android Build so the QA team can access it in a convenient manner.
ApkCopyHelperKt.setupAppApkCopy(project, "release")
