import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("AndroidXComposePlugin")
}

dependencies {
    implementation(project(":compose:ui:ui-tooling"))

    compileOnly(project(":annotation:annotation-sampled"))

    implementation(project(":xr:glimmer:glimmer"))
    implementation(project(":xr:glimmer:glimmer-google-fonts"))
}

androidx {
    name = "Compose Glimmer Google Fonts Samples"
    type = SoftwareType.SAMPLES
    inceptionYear = "2026"
    description = "Sample code for Jetpack Compose Glimmer Google Fonts"
}

android {
    compileSdk { version = release(37) }
    namespace = "androidx.xr.glimmer.googlefonts.samples"
}
