import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("AndroidXComposePlugin")
}

dependencies {
    implementation(project(":xr:compose:compose"))
    implementation(project(":xr:compose:compose-testing"))
    implementation(project(":xr:scenecore:scenecore"))
    implementation(project(":compose:material3:material3"))

    compileOnly(project(":annotation:annotation-sampled"))

    implementation("androidx.activity:activity-compose:1.10.0")
    implementation("androidx.compose.runtime:runtime:1.8.0")
    implementation("androidx.compose.foundation:foundation-layout:1.8.0")
    implementation("androidx.compose.ui:ui:1.7.0")
    implementation("androidx.compose.ui:ui-test-junit4:1.7.0")
    implementation(libs.junit)
}

androidx {
    name = "Compose for XR Testing Samples"
    type = SoftwareType.SAMPLES
    inceptionYear = "2026"
    description = "Contains the sample code for AndroidX Compose for XR Testing."
}

android {
    compileSdk { version = release(37) }
    namespace = "androidx.xr.compose.testing.samples"
    defaultConfig {
        minSdk { version = release(34) }
    }
}
